services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — persistent primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: avra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # AVRA web application
  # The web container is held back by `depends_on` until the database passes
  # its health check, preventing Prisma connection errors on cold start.
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      # Override DATABASE_URL at build time when connecting to a remote DB or
      # CI-injected secret.  The default (dummy) value is sufficient because
      # `prisma generate` does not open a live connection.
      args:
        DATABASE_URL: "postgresql://build:build@localhost:5432/builddb?schema=public"
    container_name: avra-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Runtime database connection — always uses the 'db' service hostname.
      # This is intentionally NOT interpolated from .env: the .env file holds
      # DATABASE_URL=...@localhost:... for local dev, which would break the
      # container if Docker Compose substituted it here.
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/avra?schema=public"

      # -----------------------------------------------------------------------
      # Security secrets — ${VAR:-default} reads from your .env file first;
      # the hex fallbacks are zero-touch defaults for local development only.
      #
      # Generate real keys for production:
      #   SETTINGS_ENCRYPTION_KEY / MFA_ENCRYPTION_KEY (32 bytes → 64 hex chars):
      #     node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      #   AUTH_SESSION_SECRET (64 bytes → 128 hex chars):
      #     node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      #   AUDIT_BUNDLE_SECRET / CRON_SECRET (32 bytes → 64 hex chars):
      #     node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # -----------------------------------------------------------------------

      # AES-256-GCM key for mail credentials at rest (exactly 64 hex chars).
      SETTINGS_ENCRYPTION_KEY: "${SETTINGS_ENCRYPTION_KEY:-f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2}"

      # AES-256-GCM key for TOTP/MFA secrets at rest (exactly 64 hex chars).
      MFA_ENCRYPTION_KEY: "${MFA_ENCRYPTION_KEY:-e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3}"

      # HMAC-SHA256 signing key for forensic audit bundle exports (≥32 chars).
      AUDIT_BUNDLE_SECRET: "${AUDIT_BUNDLE_SECRET:-d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4}"

      # HMAC-SHA256 session signing key (≥32 chars).
      # The hex fallback below is a DOCKER-LOCAL-DEV-ONLY default. It satisfies
      # env.ts production validation (Next.js standalone forces NODE_ENV=production
      # at runtime) without baking a weak placeholder into the container.
      # For any real deployment provide your own secret in .env:
      #   node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
      AUTH_SESSION_SECRET: "${AUTH_SESSION_SECRET:-c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5}"

      # Bearer token for /api/cron/* endpoints (≥32 chars).
      CRON_SECRET: "${CRON_SECRET:-b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6f1e2d3c4b5a6}"

      # Public-facing app URL. The runtime validator rejects localhost in
      # NODE_ENV=production — override both vars in .env for production deploys.
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"

      # NODE_ENV defaults to development so the localhost URL above is accepted
      # by the runtime validator out of the box. Set NODE_ENV=production in
      # your .env (with a real NEXT_PUBLIC_APP_URL https:// domain) for prod.
      NODE_ENV: "${NODE_ENV:-development}"
      NEXT_TELEMETRY_DISABLED: "1"

      # AI provider. Defaults to 'local' (no external API key required).
      # Set to 'mistral' and provide MISTRAL_API_KEY in .env for AI summaries.
      AI_PROVIDER: "${AI_PROVIDER:-local}"

      # Local LLM endpoint (Ollama). Inside Docker, "localhost" means the
      # container itself — use host.docker.internal to reach the host OS.
      LOCAL_AI_ENDPOINT: "${LOCAL_AI_ENDPOINT:-http://host.docker.internal:11434}"
      LOCAL_AI_MODEL: "${LOCAL_AI_MODEL:-ministral-3:8b}"

      # Allows http://localhost:3000 as NEXT_PUBLIC_APP_URL even when
      # NODE_ENV=production. Set to "false" (or omit) in real deployments.
      ALLOW_INSECURE_LOCALHOST: "${ALLOW_INSECURE_LOCALHOST:-true}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: