name: Publish Docker Image

on:
  push:
    tags:
      - "v*"           # Startet nur wenn du ein Tag wie v1.0.0 pushst
  workflow_dispatch:   # Oder manuell per Knopfdruck auf GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Privates Submodule auschecken
        env:
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          git submodule init
          git submodule set-url modules "https://${PAT}@github.com/unterdacker/venshield-enterprise.git"
          git submodule update --progress || exit 1

      - name: Submodule verifizieren
        run: |
          if [ ! -f "modules/sso/index.ts" ]; then
            echo "FEHLER: modules/sso/index.ts nicht gefunden — Submodule-Checkout fehlgeschlagen!"
            echo "Prüfe ob SUBMODULE_PAT korrekt gesetzt ist und Zugang zu unterdacker/venshield-enterprise hat."
            exit 1
          fi
          echo "Submodule OK: $(ls modules/)"

      - name: In GHCR einloggen
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unterdacker/venshield:latest
            ghcr.io/unterdacker/venshield:${{ github.ref_name }}