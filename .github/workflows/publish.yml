name: Publish Docker Image

on:
  push:
    tags:
      - "v*"           # Startet nur wenn du ein Tag wie v1.0.0 pushst
  workflow_dispatch:   # Oder manuell per Knopfdruck auf GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (mit privatem Submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: In GHCR einloggen
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unterdacker/venshield:latest
            ghcr.io/unterdacker/venshield:${{ github.ref_name }}