name: Publish Docker Image

on:
  push:
    tags:
      - "v*"           # Startet nur wenn du ein Tag wie v1.0.0 pushst
  workflow_dispatch:   # Oder manuell per Knopfdruck auf GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Privates Submodule auschecken
        run: |
          git config --global url."https://${{ secrets.SUBMODULE_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: In GHCR einloggen
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/unterdacker/venshield:latest
            ghcr.io/unterdacker/venshield:${{ github.ref_name }}